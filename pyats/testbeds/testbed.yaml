devices:
  CSR:
    os: iosxe
    type: router
    connections:
      cli:
        protocol: ssh
        ip: 192.168.0.101
        # Add these legacy SSH options
        ssh_options: '-o KexAlgorithms=+diffie-hellman-group-exchange-sha1,diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa'
    credentials:
      default:
        username: admin
        password: admin

  R2:
    os: ios
    type: router
    connections:
      cli:
        protocol: ssh
        ip: 192.168.0.102
        # Add these legacy SSH options
        ssh_options: '-o KexAlgorithms=+diffie-hellman-group-exchange-sha1,diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa'
    credentials:
      default:
        username: admin
        password: admin
